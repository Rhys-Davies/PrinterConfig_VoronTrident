## Includes
[include cartographer_probe.cfg]
[include m8pv2_mainboard.cfg]
[include sb2209_toolhead.cfg]
[include fluidd.cfg]
[include Line_Purge_Settings.cfg]
[include clean_nozzle.cfg]
[include macros.cfg]

## ---------------------------------------------- Notes ----------------------------------------------
## Leadscrew Rotation Distance values: TR8x8 = 8, TR8x4 = 4, TR8x2 = 2

[exclude_object]

[gcode_arcs]
resolution: 0.1

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 3000             #Max 4000
max_z_velocity: 15          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

[display_status] 

[idle_timeout]
timeout: 1800

[safe_z_home]
home_xy_position:175,175
z_hop:10

[z_tilt]
z_positions:
   -50, 18
   175, 398
   400, 18
points:
   35, 5
   175, 295
   325, 5

speed: 200
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075

[bed_mesh]
zero_reference_position: 175, 175 #    set this to the middle of your bed
speed: 200 #    movement speed of toolhead during bed mesh
horizontal_move_z: 3 #    height of scanner during bed mesh scan
mesh_min: 40, 25 #    start point of bed mesh [X, Y]
mesh_max: 310, 310 #    end point of bed mesh [X, Y]
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 0,0 # Disable interpolation - mesh is probably dense enough

#[z_thermal_adjust]
#temp_coeff:
#   The temperature coefficient of expansion, in mm/degC. For example, a
#   temp_coeff of 0.01 mm/degC will move the Z axis downwards by 0.01 mm for
#   every degree Celsius that the temperature sensor increases. Defaults to
#   0.0 mm/degC, which applies no adjustment.
#smooth_time:
#   Smoothing window applied to the temperature sensor, in seconds. Can reduce
#   motor noise from excessive small corrections in response to sensor noise.
#   The default is 2.0 seconds.
#z_adjust_off_above:
#   Disables adjustments above this Z height [mm]. The last computed correction
#   will remain applied until the toolhead moves below the specified Z height
#   again. The default is 99999999.0 mm (always on).
#max_z_adjustment:
#   Maximum absolute adjustment that can be applied to the Z axis [mm]. The
#   default is 99999999.0 mm (unlimited).
#sensor_type:
#sensor_pin:
#min_temp:
#max_temp:
#   Temperature sensor configuration.
#   See the "extruder" section for the definition of the above
#   parameters.
#gcode_id:
#   See the "heater_generic" section for the definition of this
#   parameter.

